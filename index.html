<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STM32 OTA via ESP32</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --warn:      #f78166;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --radius:    12px;
      --glow:      0 0 20px rgba(88,166,255,.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    /* ---- HEADER ---- */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(88,166,255,.1);
      border: 1px solid rgba(88,166,255,.3);
      border-radius: 99px;
      padding: 4px 12px;
      margin-bottom: 16px;
    }
    header h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      background: linear-gradient(135deg, #e6edf3 30%, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 14px;
    }

    /* ---- CARD ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 620px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #484f58; }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title svg { flex-shrink: 0; }

    /* ---- INPUT ---- */
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,.15);
    }

    /* ---- FILE DROP ---- */
    .file-drop {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--accent);
      background: rgba(88,166,255,.05);
    }
    .file-drop input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }
    .file-drop .icon { font-size: 32px; display: block; margin-bottom: 10px; }
    .file-drop .hint { font-size: 13px; color: var(--text-muted); }
    .file-drop .filename {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent2);
      margin-top: 6px;
      word-break: break-all;
    }

    /* ---- VERSION ---- */
    .version-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .version-row input { width: 72px; text-align: center; }
    .version-sep { color: var(--text-muted); font-weight: 700; font-size: 18px; }
    .version-row .btn-sm {
      margin-left: auto;
      padding: 8px 14px;
      font-size: 12px;
    }

    /* ---- BUTTON ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 20px;
      cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .2s;
      user-select: none;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      color: #fff;
      box-shadow: 0 4px 16px rgba(31,111,235,.4);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(31,111,235,.6); }

    .btn-success {
      background: linear-gradient(135deg, #238636, #3fb950);
      color: #fff;
      box-shadow: 0 4px 16px rgba(35,134,54,.4);
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border-radius: 10px;
    }
    .btn-success:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(35,134,54,.6); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: #484f58; }

    /* ---- STATUS PILL ---- */
    #statusPill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      transition: all .3s;
    }
    #statusPill.disconnected { background: rgba(247,129,102,.1); color: var(--warn); border: 1px solid rgba(247,129,102,.3); }
    #statusPill.checking    { background: rgba(210,153,34,.1);  color: #d19a1e; border: 1px solid rgba(210,153,34,.3); }
    #statusPill.connected   { background: rgba(63,185,80,.1);   color: var(--accent2); border: 1px solid rgba(63,185,80,.3); }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
    }
    .dot.pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* ---- PROGRESS ---- */
    .progress-wrap { margin-top: 16px; display: none; }
    .progress-wrap.visible { display: block; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
    }
    .progress-bar-bg {
      height: 8px; background: var(--surface2);
      border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1f6feb, #58a6ff);
      border-radius: 99px;
      transition: width .3s ease;
      width: 0%;
    }

    /* ---- LOG ---- */
    #log {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      padding: 16px;
      height: 260px;
      overflow-y: auto;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    #log .ok   { color: var(--accent2); }
    #log .err  { color: var(--warn); }
    #log .info { color: var(--accent); }
    #log .dim  { color: #4a5568; }

    /* ---- LOG SCROLLBAR ---- */
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ---- BOTTOM ROW ---- */
    .row { display: flex; gap: 10px; margin-top: 12px; }
    .row .btn { flex: 1; }

    /* ---- FOOTER ---- */
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <circle cx="5" cy="5" r="5" fill="#58a6ff"/>
      </svg>
      ESP32 → STM32 OTA
    </div>
    <h1>Firmware OTA Update</h1>
    <p>Upload firmware qua ESP32 WiFi → STM32 UART</p>
  </header>

  <!-- CARD: ESP32 -->
  <div class="card" id="cardConnect">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm1 3H7v1.5a2.5 2.5 0 0 0 0 5V11h2v-1.5a2.5 2.5 0 0 0 0-5V4z"/>
      </svg>
      Kết nối ESP32
    </div>

    <div class="field">
      <label for="esp32ip">Địa chỉ IP của ESP32</label>
      <input type="text" id="esp32ip" value="192.168.1.100" placeholder="192.168.x.x" />
    </div>

    <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
      <button class="btn btn-primary" id="btnPing" onclick="pingESP32()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 14a6 6 0 1 0 0-12A6 6 0 0 0 8 14zm0 1A7 7 0 1 1 8 1a7 7 0 0 1 0 14z"/>
          <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3.5A.5.5 0 0 1 7.5 8V4.5A.5.5 0 0 1 8 4z"/>
        </svg>
        Kiểm tra kết nối
      </button>
      <span id="statusPill" class="disconnected">
        <span class="dot"></span>
        Chưa kết nối
      </span>
    </div>
  </div>

  <!-- CARD: FIRMWARE -->
  <div class="card">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
        <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
      </svg>
      Firmware File
    </div>

    <div class="file-drop" id="fileDrop">
      <input type="file" id="fileInput" accept=".bin" onchange="onFileChange()" />
      <span class="icon">📦</span>
      <div class="hint">Kéo thả hoặc click để chọn file <strong>.bin</strong></div>
      <div class="filename" id="fileName"></div>
    </div>
  </div>

  <!-- CARD: VERSION -->
  <div class="card">
    <div class="card-title">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M2.5 8a5.5 5.5 0 0 1 8.25-4.764.5.5 0 0 0 .5-.866A6.5 6.5 0 1 0 14.5 8a.5.5 0 0 0-1 0 5.5 5.5 0 1 1-11 0z"/>
        <path d="M15.354 3.354a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0l7-7z"/>
      </svg>
      Phiên bản Firmware
    </div>

    <div class="version-row">
      <input type="number" id="v_major" value="1" min="0" max="255" title="Major" />
      <span class="version-sep">.</span>
      <input type="number" id="v_minor" value="0" min="0" max="255" title="Minor" />
      <span class="version-sep">.</span>
      <input type="number" id="v_patch" value="0" min="0" max="255" title="Patch" />
      <button class="btn btn-ghost btn-sm" onclick="autoPatch()">+1 Patch</button>
    </div>
  </div>

  <!-- CARD: OTA -->
  <div class="card">
    <button class="btn btn-success" id="btnOTA" onclick="startOTA()" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
        <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
      </svg>
      🚀 Bắt đầu OTA Update
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressLabel">Đang gửi...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>
  </div>

  <!-- CARD: LOG -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <span style="display:flex;align-items:center;gap:8px;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H2zm0-1h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2z"/>
          <path d="M5.5 5.5A.5.5 0 0 1 6 5h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1-.5-.5zm0 2A.5.5 0 0 1 6 7h8a.5.5 0 0 1 0 1H6a.5.5 0 0 1-.5-.5zm0 2A.5.5 0 0 1 6 9h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1-.5-.5z"/>
        </svg>
        Console Log
      </span>
      <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="clearLog()">Xóa</button>
    </div>
    <div id="log"></div>
  </div>

  <footer>STM32 OTA via ESP32 WiFi — Web Interface v2.0</footer>

  <!-- drag-drop -->
  <script>
    const drop = document.getElementById('fileDrop');
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) { document.getElementById('fileInput').files = e.dataTransfer.files; onFileChange(); }
    });
  </script>
  <script src="ota.js"></script>
</body>
</html>
